<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Demand Management Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Demand Management Dashboard</h1>

  <div class="dashboard">
    <div class="card">Total: <span id="totalCount">0</span></div>
    <div class="card">New: <span id="newCount">0</span></div>
    <div class="card">In Progress: <span id="inProgressCount">0</span></div>
    <div class="card">Approved: <span id="approvedCount">0</span></div>
    <div class="card">Completed: <span id="completedCount">0</span></div>
  </div>

  <div class="role">Role: <span id="roleCount">N/A</span></div>

  <button id="refreshBtn">Refresh</button>

  <script src="app.js"></script>
</body>
</html>
